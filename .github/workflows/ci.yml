name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: deno task build
      - run: deno task test:browser
